<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#00AAFF"/>
    </linearGradient>
    <linearGradient id="tail-grad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#FF5500"/>
    </linearGradient>
    <linearGradient id="tail-mid" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#0055DD"/>
      <stop offset="100%" stop-color="#EE4400"/>
    </linearGradient>
  </defs>

  <!-- Black background -->
  <rect width="100" height="100" fill="#000000"/>

  <!-- T horizontal bar (teal, right end swept) -->
  <path d="M17,27 L69,27 Q76,27 74,35 Q71,38 68,37 L53,37 L38,37 L17,37 Z" fill="url(#teal-grad)"/>

  <!-- T vertical stem -->
  <rect x="38" y="27" width="15" height="20" fill="url(#teal-grad)"/>

  <!-- Tail layer - back (darkest blue) -->
  <path d="M47,50 C56,47 72,51 72,72 C64,62 50,66 43,73 C37,62 40,53 47,50 Z" fill="#003AB5" opacity="0.7"/>

  <!-- Tail layer - middle -->
  <path d="M49,47 C60,44 76,50 75,74 C66,62 51,67 43,75 C36,62 40,50 49,47 Z" fill="url(#tail-mid)" opacity="0.85"/>

  <!-- Tail layer - front (brightest) -->
  <path d="M51,44 C64,41 79,49 77,76 C67,62 52,68 43,76 C36,62 41,48 51,44 Z" fill="url(#tail-grad)"/>
</svg>
