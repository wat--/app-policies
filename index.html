<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tail Studio - アプリ一覧</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.8;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
            background-color: #f5f5f7;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: #1a1a1a;
            font-size: 2em;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 1.1em;
        }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .app-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .app-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            background: linear-gradient(135deg, #007AFF, #5856D6);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .app-name {
            font-size: 1.3em;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .app-description {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 16px;
        }
        .app-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .app-links a {
            color: #007AFF;
            text-decoration: none;
            font-size: 0.9em;
            padding: 6px 12px;
            background: #f0f0f5;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .app-links a:hover {
            background: #e5e5ea;
        }
        footer {
            margin-top: 60px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
        footer a {
            color: #007AFF;
            text-decoration: none;
        }
        .appstore-banner {
            text-align: center;
            margin-bottom: 32px;
        }
        .appstore-banner a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #000;
            color: #fff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.95em;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .appstore-banner a:hover {
            opacity: 0.8;
        }
        .appstore-banner svg {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Tail Studio</h1>
        <p class="subtitle">アプリケーション一覧</p>
    </header>

    <main>
        <div class="appstore-banner">
            <a href="https://apps.apple.com/jp/developer/t-studio/id1861302137" target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 814 1000" fill="white">
                    <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.3-148.9-90.1C14.7 762.8 0 681 0 607.9 0 397.1 137.4 279.5 272.7 279.5c69.5 0 127.6 45.4 171.6 45.4 42.3 0 109-48 190.7-48 30.8 0 108.2 2.6 168 57.7zm-234.2-122.4c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
                </svg>
                App Storeで全アプリを見る
            </a>
        </div>
        <div id="app-grid" class="app-grid"></div>
    </main>

    <footer>
        <p>お問い合わせ: <a href="mailto:contact@tail-studio.com">contact@tail-studio.com</a></p>
        <p>&copy; <span id="year"></span> Tail Studio</p>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        fetch('apps.json')
            .then(res => res.json())
            .then(apps => {
                const grid = document.getElementById('app-grid');
                apps.forEach(app => {
                    const links = app.links.map(link =>
                        `<a href="${link.url}">${link.label}</a>`
                    ).join('');

                    grid.innerHTML += `
                        <div class="app-card">
                            <div class="app-icon">${app.icon}</div>
                            <div class="app-name">${app.name}</div>
                            <p class="app-description">${app.description}</p>
                            <div class="app-links">${links}</div>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
